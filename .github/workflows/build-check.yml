name: build-check
on: [push]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build validation
        run: |
          if [ -x ./scripts/setup.sh ] && [ -x ./tests/validate-build-test.sh ]; then
            ./scripts/setup.sh
            ./tests/validate-build-test.sh
          elif [ -f build-status.json ]; then
            jq -e '.status == "active"' build-status.json > /dev/null
          else
            echo "No build validation command found" >&2
            exit 1
          fi
